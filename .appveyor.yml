# Build SocNetV for Windows x86_64 using Qt/MSVC2019 platform
# https://socnetv.org
# Last Update: Feb 2026
# Copyright (c) 2026 by Dimitris Kalamaras
#
# This script builds SocNetV Windows installers ONLY on tags i.e. 3.0 or 3.0-beta*
# created by the developer, as well when the 'continuous' tag is recreated.
#
# NOTE:
# To avoid possible cycles with creating new tags on regular commits or overwriting tags, we
# specify tag: $(APPVEYOR_REPO_TAG_NAME) in deployment settings and use the on: key to
# conditionally build and deploy only on tags we create manually.
# See: https://www.appveyor.com/docs/deployment/github/#promoting-selected-tag-to-github-release

version: 'continuous.{build}'

#---------------------------------#
#   conditional building config   #
#---------------------------------#
branches:
  only:
    - master
    - develop
    - /v\d+\.\d+/
    - /v\d+\.\d+\.\d+/
    - /v\d+\.\d+\-\w+/

only_commits:
  message: /\[appveyor\]/
  author: dimitris.kalamaras@gmail.com

#---------------------------------#
#    environment configuration    #
#---------------------------------#
image: Visual Studio 2019

clone_folder: c:\projects\socnetv

matrix:
  fast_finish: true

install:
  - ps: Write-Host $env:APPVEYOR_PROJECT_NAME
  - ps: Write-Host $env:APPVEYOR_PROJECT_SLUG
  - ps: Write-Host $env:APPVEYOR_BUILD_WORKER_IMAGE
  - ps: Write-Host $env:APPVEYOR_REPO_BRANCH
  - ps: Write-Host $env:APPVEYOR_REPO_COMMIT
  - ps: Write-Host $env:APPVEYOR_REPO_TAG
  - ps: Write-Host $env:APPVEYOR_REPO_TAG_NAME
  - cmd: echo "Setting last commit short id"
  - cmd: git rev-parse --short HEAD > MYVER.txt
  - cmd: set /p LAST_COMMIT_SHORT= < MYVER.txt
  - cmd: echo %LAST_COMMIT_SHORT%
  - cmd: del MYVER.txt
  - cmd: echo %APPVEYOR_REPO_COMMIT:~0,7%
  - cmd: echo "Setting SocNetV current version..."
  # NOTE: This is changed by our update version bash script
  - cmd: set SOCNETV_VERSION=3.3
  - cmd: echo %SOCNETV_VERSION%
  - cmd: echo "Setting build type"
  - cmd: set BUILD_TYPE=Release
  - cmd: echo %BUILD_TYPE%
  - cmd: echo "Checking if this is a prerelease deployment..."
  - cmd: set SOCNETV_PRERELEASE=false
  - cmd: if "%APPVEYOR_REPO_TAG%"=="true" if "%APPVEYOR_REPO_TAG_NAME%"=="continuous" set SOCNETV_PRERELEASE=true
  - ps: if ($env:APPVEYOR_REPO_COMMIT_MESSAGE.Contains("[appveyor]")) {$env:SOCNETV_PRERELEASE = "true"}
  - ps: if ($env:APPVEYOR_REPO_COMMIT_MESSAGE.Contains("[travis]")) {$env:SOCNETV_PRERELEASE = "true"}
  - ps: if ($env:APPVEYOR_REPO_COMMIT_MESSAGE.Contains("[ci]")) {$env:SOCNETV_PRERELEASE = "true"}
  - ps: if ( $env:APPVEYOR_REPO_TAG_NAME -ne $null ) { if ($env:APPVEYOR_REPO_TAG_NAME.Contains("-beta")) { $env:SOCNETV_PRERELEASE = "true" } }
  - ps: if ( $env:APPVEYOR_REPO_TAG_NAME -ne $null ) { if ($env:APPVEYOR_REPO_TAG_NAME.Contains("-rc")) { $env:SOCNETV_PRERELEASE = "true" } }
  - ps: Write-Host $env:SOCNETV_PRERELEASE
  - cmd: if "%SOCNETV_PRERELEASE%"=="true" echo "This is a prerelease"
  - cmd: echo "Setting BUILDNAME"
  - set BUILDNAME=%SOCNETV_VERSION%-%LAST_COMMIT_SHORT%
  - cmd: echo %BUILDNAME%
  - cmd: echo "Setting Qt + MSVC environment..."
  - cmd: echo "Check Qt folders (debug)..."
  - cmd: dir C:\Qt
  # Qt 6.8.0 with MSVC2022 64-bit (preinstalled on Appveyor VS2019 image via aqtinstall or preinstalled)
  # NOTE: Appveyor's VS2019 image ships Qt 6.x via aqtinstall.
  # Check available versions at: https://www.appveyor.com/docs/windows-images-software/#qt
  # Adjust path below if Appveyor's preinstalled Qt version differs.
  - set QTDIR=C:\Qt\6.8.0\msvc2022_64
  - cmd: echo "Check project folder..."
  - cmd: dir C:\projects\socnetv
  - cmd: echo "Installing Innosetup..."
  - choco install -y InnoSetup
  - cmd: echo "Setting paths..."
  - set PATH=%QTDIR%\bin;%PATH%;"C:\Program Files (x86)\Inno Setup 6"
  - cmd: echo "Verify qmake and cmake..."
  - cmd: where qmake
  - cmd: where cmake
  - cmd: qmake -v
  - cmd: cmake --version

#---------------------------------#
#    app building starts here     #
#---------------------------------#
build_script:
  - cmd: echo "Configuring project with cmake..."
  - cmd: cmake -S . -B build -DCMAKE_BUILD_TYPE=%BUILD_TYPE% -DBUILD_CLI=OFF
  - cmd: echo "Building %BUILD_TYPE% with cmake..."
  - cmd: cmake --build build -j4 --config %BUILD_TYPE% -v

after_build:
  - cmd: echo "Check build folder contents"
  - cmd: dir C:\projects\socnetv\build
  - cmd: dir C:\projects\socnetv\build\%BUILD_TYPE%
  - cmd: echo "Executing windeployqt..."
  - cmd: windeployqt build\%BUILD_TYPE%\socnetv.exe --release --compiler-runtime
  - cmd: echo "Copying MSVC runtime DLLs..."
  - cmd: copy "C:\Windows\System32\MSVCP140.dll" build\%BUILD_TYPE%\
  - cmd: copy "C:\Windows\System32\MSVCP140_1.dll" build\%BUILD_TYPE%\
  - cmd: copy "C:\Windows\System32\MSVCP140_2.dll" build\%BUILD_TYPE%\
  - cmd: copy "C:\Windows\System32\VCRUNTIME140.dll" build\%BUILD_TYPE%\
  - cmd: copy "C:\Windows\System32\VCRUNTIME140_1.dll" build\%BUILD_TYPE%\
  - cmd: copy "C:\Windows\System32\CONCRT140.dll" build\%BUILD_TYPE%\
  - cmd: echo "check build folder contents again..."
  - cmd: dir C:\projects\socnetv\build\%BUILD_TYPE%
  - cmd: echo "copy COPYING to LICENSE.txt..."
  - cmd: copy COPYING build\%BUILD_TYPE%\LICENSE.txt
  - cmd: echo "Running Innosetup..."
  - cmd: copy C:\projects\socnetv\scripts\innosetup.iss build\innosetup.iss
  - cmd: echo "Updating RELEASEFOLDER in innosetup.iss..."
  - ps: |
      $content = Get-Content "build\innosetup.iss"
      $content = $content -replace '#define RELEASEFOLDER "release\\"', "#define RELEASEFOLDER `"$env:BUILD_TYPE\\`""
      Set-Content "build\innosetup.iss" $content
  - cmd: echo "Available Innosetup languages:"
  - cmd: dir "C:\Program Files (x86)\Inno Setup 6\Languages"
  - cmd: cd build && iscc innosetup.iss
  - cmd: type build\Setup-Manifest.txt
  - cmd: dir build\SocNetV*.exe
  - cmd: echo "Renaming installer..."
  - ps: Get-ChildItem -Path "build\SocNetV-*installer.exe" | Move-Item -Destination "build\SocNetV-$env:BUILDNAME-windows-installer.exe"
  - cmd: dir build\SocNetV*.exe

artifacts:
  - path: build\SocNetV-*-installer.exe

#---------------------------------#
#    Deploy to GitHub Releases    #
#---------------------------------#
deploy:
  - provider: GitHub
    tag: continuous
    description: 'SocNetV continuous integration prereleases from commit ${APPVEYOR_REPO_COMMIT}'
    artifact: /SocNetV.*installer\.exe/
    auth_token:
      secure: rWpgp9XYDS/Tqr6dsQ2CK1x/vgE4nMyQ3W7oyQlG2L3oF4tecU8CEDW1EY5Us0mZ
    draft: false
    prerelease: true
    force_update: true
    on:
      branch: $(APPVEYOR_REPO_BRANCH)
      SOCNETV_PRERELEASE: true
  - provider: GitHub
    tag: $(APPVEYOR_REPO_TAG_NAME)
    description: 'SocNetV release for $(APPVEYOR_REPO_TAG_NAME)'
    artifact: /SocNetV.*installer\.exe/
    auth_token:
      secure: rWpgp9XYDS/Tqr6dsQ2CK1x/vgE4nMyQ3W7oyQlG2L3oF4tecU8CEDW1EY5Us0mZ
    draft: false
    prerelease: false
    force_update: true
    on:
      branch: $(APPVEYOR_REPO_BRANCH)
      APPVEYOR_REPO_TAG: true
      SOCNETV_PRERELEASE: false

# Notify developer on any change
notifications:
  - provider: Email
    to:
      - dimitris.kalamaras@gmail.com
    subject: '[socnetv/app] build {{status}}'
    on_build_status_changed: true